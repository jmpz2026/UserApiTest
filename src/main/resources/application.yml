server:
  port: 8081

spring:
  application:
    name: UserApiTest

  datasource:
    url: jdbc:h2:file:./data/UserApiTest
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true


logging:
  level:
    org.springframework: INFO
    com.myapp: DEBUG